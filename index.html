<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micro-Task Registration and Tracking - Basketball Tournament and Game Fair</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      color: #333;
    }
    h1, h2, h3 {
      color: #2c3e50;
    }
    .event-info {
      background-color: #f8f9fa;
      border-left: 4px solid #3498db;
      padding: 10px 15px;
      margin-bottom: 20px;
    }
    .form-section {
      margin-bottom: 30px;
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 5px;
    }
    .form-section h2 {
      background-color: #3498db;
      color: white;
      padding: 10px;
      margin-top: 0;
      border-radius: 3px;
    }
    .task-group {
      margin-bottom: 15px;
      padding: 10px;
      background-color: #f9f9f9;
      border-radius: 5px;
    }
    .task-details {
      padding: 10px;
      background-color: #e8f4fc;
      margin-top: 10px;
      border-radius: 3px;
    }
    .task-assignment {
      background-color: #eafaea;
      padding: 15px;
      margin-top: 10px;
      border-radius: 3px;
      border: 1px solid #c3e6cb;
    }
    label {
      display: block;
      margin-bottom: 10px;
    }
    .task-checkbox {
      margin-right: 8px;
    }
    input[type="text"], 
    input[type="date"],
    input[type="time"],
    select,
    textarea {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background-color: #2ecc71;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #27ae60;
    }
    .skill-tag {
      display: inline-block;
      background-color: #3498db;
      color: white;
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 12px;
      margin-right: 5px;
    }
    .priority-high {
      display: inline-block;
      background-color: #e74c3c;
      color: white;
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 12px;
      margin-right: 5px;
    }
    .required-label {
      color: #e74c3c;
      font-size: 14px;
      margin-left: 5px;
    }
    .task-tracking {
      margin-top: 30px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #3498db;
      color: white;
    }
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }
    .action-btn {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      margin-right: 5px;
    }
    .action-btn:hover {
      background-color: #2980b9;
    }
    .remove-btn {
      background-color: #e74c3c;
    }
    .remove-btn:hover {
      background-color: #c0392b;
    }
    .complete-btn {
      background-color: #2ecc71;
    }
    .complete-btn:hover {
      background-color: #27ae60;
    }
    .tab-container {
      margin-bottom: 20px;
    }
    .tab {
      overflow: hidden;
      border: 1px solid #ccc;
      background-color: #f1f1f1;
      border-radius: 5px 5px 0 0;
    }
    .tab button {
      background-color: inherit;
      float: left;
      border: none;
      outline: none;
      cursor: pointer;
      padding: 14px 16px;
      transition: 0.3s;
      font-size: 16px;
      color: #333;
    }
    .tab button:hover {
      background-color: #ddd;
    }
    .tab button.active {
      background-color: #3498db;
      color: white;
    }
    .tabcontent {
      display: none;
      padding: 20px;
      border: 1px solid #ccc;
      border-top: none;
      border-radius: 0 0 5px 5px;
      animation: fadeEffect 1s;
    }
    @keyframes fadeEffect {
      from {opacity: 0;}
      to {opacity: 1;}
    }
    .category-header {
      background-color: #f0f0f0;
      padding: 5px 10px;
      margin: 15px 0 10px 0;
      border-left: 4px solid #3498db;
      font-weight: bold;
    }
    .search-box {
      margin-bottom: 20px;
    }
    .search-box input {
      width: 70%;
      padding: 8px;
      margin-right: 10px;
    }
    .filter-options {
      margin-bottom: 15px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    .filter-options select {
      width: auto;
    }
    .subtask-row {
      background-color: #f8f9fa;
      font-style: italic;
    }
    .subtask-row td:first-child {
      padding-left: 25px;
    }
    .task-category {
      font-weight: bold;
      background-color: #e9ecef;
    }
    .expand-btn {
      background-color: transparent;
      border: none;
      color: #3498db;
      cursor: pointer;
      font-size: 16px;
      padding: 0 5px;
    }
    .hidden {
      display: none;
    }
    .google-share-info {
      background-color: #e8f5e9;
      padding: 10px;
      border-left: 4px solid #4caf50;
      margin-bottom: 20px;
    }
    .submit-btn {
      background-color: #4caf50;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
      display: block;
      width: 100%;
      text-align: center;
    }
    .submit-btn:hover {
      background-color: #45a049;
    }
    .error-message {
      color: #e74c3c;
      background-color: #fadbd8;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 10px;
      border-radius: 4px;
      display: none;
    }
    .user-controls {
      text-align: right;
      margin-bottom: 15px;
    }
    .user-controls button {
      background-color: #3498db;
      padding: 8px 12px;
      font-size: 14px;
    }
    .user-display {
      margin-left: 10px;
      font-weight: bold;
    }
    .checkbox-container {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    .checkbox-container input[type="checkbox"] {
      margin-right: 8px;
    }
    .modal {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background-color: white;
      padding: 20px;
      border-radius: 5px;
      width: 60%;
      max-width: 600px;
    }
    .assignee-list {
      max-height: 300px;
      overflow-y: auto;
    }
    
    /* Styles pour les sélecteurs de statut */
    .status-select {
      padding: 5px;
      border-radius: 3px;
      border: 1px solid #ddd;
      background-color: transparent;
      width: 100%;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      color: white; /* Texte blanc pour meilleure lisibilité */
    }
    
    .status-select option {
      font-weight: normal;
      background-color: white;
      color: black; /* Options en noir sur fond blanc */
    }
    
    .status-select.status-not-started {
      background-color: #e74c3c; /* Rouge vif */
      border-color: #c0392b;
    }
    
    .status-select.status-in-progress {
      background-color: #f39c12; /* Orange */
      border-color: #d35400;
    }
    
    .status-select.status-completed {
      background-color: #2ecc71; /* Vert */
      border-color: #27ae60;
    }
    
    /* Styles pour les badges de statut */
    .status-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: bold;
      width: 100%;
      text-align: center;
      box-sizing: border-box;
      color: white;
    }
    
    .status-not-started {
      background-color: #e74c3c; /* Rouge vif */
      color: white;
    }
    
    .status-in-progress {
      background-color: #f39c12; /* Orange */
      color: white;
    }
    
    .status-completed {
      background-color: #2ecc71; /* Vert */
      color: white;
    }
  </style>
</head>
<body>
  <!-- Le reste du code HTML reste identique, je l'omets pour la clarté -->
  
  <script>
    // Fonction pour obtenir l'utilisateur actuel
    function getCurrentUser() {
      let currentUser = localStorage.getItem('currentUser');
      
      if (!currentUser) {
        currentUser = prompt('Please enter your name to identify your tasks:');
        if (currentUser) {
          localStorage.setItem('currentUser', currentUser);
        }
      }
      
      return currentUser;
    }
    
    // Tab functionality
    function openTab(evt, tabName) {
      var i, tabcontent, tablinks;
      tabcontent = document.getElementsByClassName("tabcontent");
      for (i = 0; i < tabcontent.length; i++) {
        tabcontent[i].style.display = "none";
      }
      tablinks = document.getElementsByClassName("tablinks");
      for (i = 0; i < tablinks.length; i++) {
        tablinks[i].className = tablinks[i].className.replace(" active", "");
      }
      document.getElementById(tabName).style.display = "block";
      evt.currentTarget.className += " active";
      
      // Initialize tracking tab when opened
      if (tabName === 'tracking') {
        initializeTrackingTab();
      }
    }
    
    // Function to toggle visibility of subtasks
    function toggleSubtasks(parentId) {
      const subtasks = document.querySelectorAll(`tr[data-parent="${parentId}"]`);
      const button = event.target;
      
      subtasks.forEach(row => {
        if (row.classList.contains('hidden')) {
          row.classList.remove('hidden');
          button.textContent = '-';
        } else {
          row.classList.add('hidden');
          button.textContent = '+';
        }
      });
    }
    
    // Function to search tasks
    function searchTasks() {
      const searchText = document.getElementById('task-search').value.toLowerCase();
      const rows = document.querySelectorAll('#tracking-table tbody tr:not(.task-category)');
      
      rows.forEach(row => {
        const taskName = row.cells[0].textContent.toLowerCase();
        if (taskName.includes(searchText)) {
          row.style.display = '';
          
          // If it's a subtask, also show its parent category
          if (row.classList.contains('subtask-row')) {
            const parentId = row.getAttribute('data-parent');
            const parentRows = document.querySelectorAll(`tr.main-task`);
            parentRows.forEach(parentRow => {
              if (parentRow.cells[0].textContent.toLowerCase().includes(parentId.toLowerCase())) {
                parentRow.style.display = '';
              }
            });
          }
        } else {
          row.style.display = 'none';
        }
      });
    }
    
    // Function to filter tasks by status, category, and user
    function filterTasks() {
      const statusFilter = document.getElementById('status-filter').value;
      const categoryFilter = document.getElementById('category-filter').value;
      const currentUser = getCurrentUser();
      const showOnlyMyTasks = document.getElementById('my-tasks-filter').checked;
      
      const rows = document.querySelectorAll('#tracking-table tbody tr:not(.task-category)');
      
      rows.forEach(row => {
        let showRow = true;
        
        // Status filtering
        if (statusFilter !== 'all') {
          const statusText = row.cells[5].textContent.toLowerCase();
          if (statusFilter === 'not-started' && !statusText.includes('not started')) showRow = false;
          if (statusFilter === 'in-progress' && !statusText.includes('in progress')) showRow = false;
          if (statusFilter === 'completed' && !statusText.includes('completed')) showRow = false;
        }
        
        // Category filtering
        if (categoryFilter !== 'all') {
          const categoryText = row.cells[1].textContent.toLowerCase();
          if (!categoryText.includes(categoryFilter.toLowerCase())) showRow = false;
        }
        
        // User filtering
        if (showOnlyMyTasks && currentUser) {
          const assignedTo = row.cells[2].textContent;
          if (!assignedTo.includes(currentUser)) showRow = false;
        }
        
        row.style.display = showRow ? '' : 'none';
      });
    }
    
    // Function to get registered tasks from localStorage
    function getRegisteredTasks() {
      const tasksJson = localStorage.getItem('registeredTasks');
      return tasksJson ? JSON.parse(tasksJson) : [];
    }
    
    // Function to collect task data from selected tasks
    function collectTaskData(selectedTasks) {
      const taskData = [];
      const name = document.getElementById('name').value;
      const title = document.getElementById('class').value;
      
      selectedTasks.forEach(taskCheckbox => {
        const taskId = taskCheckbox.value;
        const taskGroup = taskCheckbox.closest('.task-group');
        
        // Find the subtask select element
        const subtaskSelect = taskGroup.querySelector(`select[id="${taskId}-subtask"]`);
        let subtaskId = '';
        let subtaskName = '';
        
        if (subtaskSelect && subtaskSelect.value) {
          subtaskId = subtaskSelect.value;
          subtaskName = subtaskSelect.options[subtaskSelect.selectedIndex].text;
        }
        
        // Get deadline if available
        const deadlineInput = taskGroup.querySelector(`input[id="${taskId}-deadline"]`);
        const deadline = deadlineInput ? deadlineInput.value : '';
        
        // Get reminder information
        const reminderDateInput = taskGroup.querySelector(`input[id="${taskId}-reminder-date"]`);
        const reminderTimeInput = taskGroup.querySelector(`input[id="${taskId}-reminder-time"]`);
        const reminderDate = reminderDateInput ? reminderDateInput.value : '';
        const reminderTime = reminderTimeInput ? reminderTimeInput.value : '';
        
        // Get notes
        const notesTextarea = taskGroup.querySelector(`textarea[id="${taskId}-notes"]`);
        const notes = notesTextarea ? notesTextarea.value : '';
        
        taskData.push({
          taskId: taskId,
          subtaskId: subtaskId,
          subtaskName: subtaskName,
          name: name,
          title: title,
          deadline: deadline,
          reminderDate: reminderDate,
          reminderTime: reminderTime,
          notes: notes,
          status: 'not-started' // Statut par défaut: Not started
        });
      });
      
      return taskData;
    }
    
    // Function to save task registration data - Allows multiple registrations
    function saveTaskRegistration(taskData) {
      let registeredTasks = getRegisteredTasks();
      
      // Simply add the new tasks without checking for duplicates
      registeredTasks = registeredTasks.concat(taskData);
      
      localStorage.setItem('registeredTasks', JSON.stringify(registeredTasks));
    }
    
    // Function to get all people assigned to a specific task/subtask
    function getAllAssignedPeople(taskId, subtaskId) {
      const tasks = getRegisteredTasks().filter(t => 
        t.taskId === taskId && t.subtaskId === subtaskId
      );
      
      // Extract unique names
      const names = [...new Set(tasks.map(t => t.name))];
      return names;
    }
    
    // Fonction modifiée pour mettre à jour une tâche dans le tableau de suivi
    function updateTaskInTrackingTable(task) {
      const taskId = task.taskId;
      const subtaskId = task.subtaskId;
      const status = task.status || 'not-started'; // Par défaut: Not started
      
      // Trouver la ligne de la tâche principale
      let mainTaskRow = null;
      const mainTaskRows = document.querySelectorAll('tr.main-task');
      
      for (let i = 0; i < mainTaskRows.length; i++) {
        const row = mainTaskRows[i];
        const taskCell = row.cells[0];
        if (taskCell && taskCell.textContent.toLowerCase().includes(taskId.toLowerCase())) {
          mainTaskRow = row;
          break;
        }
      }
      
      if (mainTaskRow) {
        // Si pas de sous-tâche spécifique, mettre à jour la ligne de la tâche principale
        if (!subtaskId) {
          // Obtenir toutes les personnes assignées à cette tâche principale
          const assignedPeople = getAllAssignedPeople(taskId, '');
          
          // Mettre à jour la cellule avec toutes les personnes assignées
          mainTaskRow.cells[2].textContent = assignedPeople.length > 0 ? assignedPeople.join(', ') : 'Not assigned yet';
          
          // Mettre à jour la date limite (utiliser la plus proche)
          const deadlines = getRegisteredTasks()
            .filter(t => t.taskId === taskId && (!t.subtaskId || t.subtaskId === ''))
            .map(t => t.deadline)
            .filter(d => d);
          
          if (deadlines.length > 0) {
            deadlines.sort();
            mainTaskRow.cells[3].textContent = deadlines[0];
          }
          
          // Mettre à jour le statut avec un sélecteur intégré
          mainTaskRow.cells[5].innerHTML = `
            <select class="status-select status-${status}" onchange="updateTaskStatus('${taskId}', '', this.value)">
              <option value="not-started" ${status === 'not-started' ? 'selected' : ''}>Not started</option>
              <option value="in-progress" ${status === 'in-progress' ? 'selected' : ''}>In progress</option>
              <option value="completed" ${status === 'completed' ? 'selected' : ''}>Completed</option>
            </select>
          `;
          
          // Mettre à jour les actions
          mainTaskRow.cells[6].innerHTML = `
            <button class="action-btn" onclick="editTask('${taskId}')">Edit</button>
          `;
        } else {
          // Trouver et mettre à jour la ligne de la sous-tâche spécifique
          const subtaskRows = document.querySelectorAll(`tr.subtask-row[data-parent="${taskId}"]`);
          
          for (let i = 0; i < subtaskRows.length; i++) {
            const row = subtaskRows[i];
            const subtaskCell = row.cells[0];
            
            if (subtaskCell && subtaskCell.textContent.toLowerCase().includes(task.subtaskName.toLowerCase())) {
              // Obtenir toutes les personnes assignées à cette micro-tâche
              const assignedPeople = getAllAssignedPeople(taskId, subtaskId);
              
              // Mettre à jour la cellule avec toutes les personnes assignées
              row.cells[2].textContent = assignedPeople.length > 0 ? assignedPeople.join(', ') : 'Not assigned yet';
              
              // Mettre à jour la date limite (utiliser la plus proche)
              const deadlines = getRegisteredTasks()
                .filter(t => t.taskId === taskId && t.subtaskId === subtaskId)
                .map(t => t.deadline)
                .filter(d => d);
              
              if (deadlines.length > 0) {
                deadlines.sort();
                row.cells[3].textContent = deadlines[0];
              }
              
              // Mettre à jour l'heure si fournie
              if (task.reminderTime) {
                row.cells[4].textContent = task.reminderTime;
              }
              
              // Mettre à jour le statut avec un sélecteur intégré
              row.cells[5].innerHTML = `
                <select class="status-select status-${status}" onchange="updateTaskStatus('${taskId}', '${subtaskId}', this.value)">
                  <option value="not-started" ${status === 'not-started' ? 'selected' : ''}>Not started</option>
                  <option value="in-progress" ${status === 'in-progress' ? 'selected' : ''}>In progress</option>
                  <option value="completed" ${status === 'completed' ? 'selected' : ''}>Completed</option>
                </select>
              `;
              
              // Mettre à jour les actions
              row.cells[6].innerHTML = `
                <button class="action-btn" onclick="editTask('${subtaskId}')">Edit</button>
                <button class="action-btn" onclick="viewAssignees('${taskId}', '${subtaskId}')">View All</button>
              `;
              
              // Développer les sous-tâches pour afficher la tâche assignée
              const expandBtn = mainTaskRow.querySelector('.expand-btn');
              if (expandBtn && expandBtn.textContent === '+') {
                expandBtn.click();
              }
              
              break;
            }
          }
        }
      }
    }
    
    // Fonction pour mettre à jour le statut d'une tâche
    function updateTaskStatus(taskId, subtaskId, status) {
      // Mettre à jour le statut dans le localStorage
      let registeredTasks = getRegisteredTasks();
      
      if (subtaskId) {
        // Mise à jour d'une sous-tâche
        registeredTasks.forEach(task => {
          if (task.taskId === taskId && task.subtaskId === subtaskId) {
            task.status = status;
          }
        });
      } else {
        // Mise à jour d'une tâche principale
        registeredTasks.forEach(task => {
          if (task.taskId === taskId && (!task.subtaskId || task.subtaskId === '')) {
            task.status = status;
          }
        });
      }
      
      localStorage.setItem('registeredTasks', JSON.stringify(registeredTasks));
      
      // Trouver la ligne de tâche appropriée
      let taskRow;
      
      if (!subtaskId) {
        // Tâche principale
        const mainTaskRows = document.querySelectorAll('tr.main-task');
        for (let i = 0; i < mainTaskRows.length; i++) {
          const row = mainTaskRows[i];
          if (row.cells[0].textContent.toLowerCase().includes(taskId.toLowerCase())) {
            taskRow = row;
            break;
          }
        }
      } else {
        // Sous-tâche
        const subtaskRows = document.querySelectorAll(`tr.subtask-row[data-parent="${taskId}"]`);
        for (let i = 0; i < subtaskRows.length; i++) {
          const row = subtaskRows[i];
          if (row.cells[0].textContent.toLowerCase().includes(subtaskId.toLowerCase())) {
            taskRow = row;
            break;
          }
        }
      }
      
      if (taskRow) {
        // Mettre à jour la classe du sélecteur pour changer sa couleur
        const statusSelect = taskRow.cells[5].querySelector('.status-select');
        if (statusSelect) {
          // Supprimer toutes les classes de statut existantes
          statusSelect.classList.remove('status-not-started', 'status-in-progress', 'status-completed');
          
          // Ajouter la nouvelle classe de statut
          statusSelect.classList.add('status-' + status);
        }
        
        // Si c'est une sous-tâche, vérifier l'impact sur la tâche parent
        if (subtaskId) {
          if (status === 'completed') {
            // Vérifier si toutes les sous-tâches sont complétées
            const subtaskRows = document.querySelectorAll(`tr.subtask-row[data-parent="${taskId}"]`);
            let allCompleted = true;
            
            for (let i = 0; i < subtaskRows.length; i++) {
              const subtaskSelect = subtaskRows[i].cells[5].querySelector('.status-select');
              if (subtaskSelect && subtaskSelect.value !== 'completed') {
                allCompleted = false;
                break;
              }
            }
            
            if (allCompleted) {
              // Mettre à jour la tâche parent comme complétée
              const mainTaskRows = document.querySelectorAll('tr.main-task');
              for (let i = 0; i < mainTaskRows.length; i++) {
                const row = mainTaskRows[i];
                if (row.cells[0].textContent.toLowerCase().includes(taskId.toLowerCase())) {
                  const parentSelect = row.cells[5].querySelector('.status-select');
                  if (parentSelect) {
                    parentSelect.value = 'completed';
                    parentSelect.classList.remove('status-not-started', 'status-in-progress');
                    parentSelect.classList.add('status-completed');
                    
                    // Mettre à jour également dans le localStorage
                    updateTaskStatus(taskId, '', 'completed');
                  }
                  break;
                }
              }
            }
          } else {
            // Si une sous-tâche n'est pas complétée, la tâche parent ne peut pas être complétée
            const mainTaskRows = document.querySelectorAll('tr.main-task');
            for (let i = 0; i < mainTaskRows.length; i++) {
              const row = mainTaskRows[i];
              if (row.cells[0].textContent.toLowerCase().includes(taskId.toLowerCase())) {
                const parentSelect = row.cells[5].querySelector('.status-select');
                if (parentSelect && parentSelect.value === 'completed') {
                  parentSelect.value = 'in-progress';
                  parentSelect.classList.remove('status-not-started', 'status-completed');
                  parentSelect.classList.add('status-in-progress');
                  
                  // Mettre à jour également dans le localStorage
                  updateTaskStatus(taskId, '', 'in-progress');
                }
                break;
              }
            }
          }
        }
      }
    }
    
    // Le reste du code JavaScript reste identique
  </script>
</body>
